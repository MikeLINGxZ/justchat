name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: LemonTeaDesktop

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install cnpm
        shell: pwsh
        run: npm install -g cnpm --registry=https://registry.npmmirror.com

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          "$((go env GOPATH))\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        shell: pwsh
        run: cnpm install

      - name: Build Windows installer
        shell: pwsh
        run: wails3 package GOOS=windows

      - name: Prepare Windows release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem -Path bin,build/windows/nsis -Filter "*-installer.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer not found"
          }
          $target = "release/${env:APP_NAME}-windows-amd64-$tag-installer.exe"
          Copy-Item $installer.FullName $target -Force

      - name: Upload Windows asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*.exe
          fail_on_unmatched_files: true

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install cnpm
        run: npm install -g cnpm --registry=https://registry.npmmirror.com

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: frontend
        run: cnpm install

      - name: Build universal macOS app
        run: wails3 task darwin:package:universal

      - name: Prepare macOS release asset
        run: |
          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          ditto -c -k --keepParent "bin/${APP_NAME}.app" "release/${APP_NAME}-macos-universal-${TAG}.zip"

      - name: Upload macOS asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*.zip
          fail_on_unmatched_files: true

  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install cnpm
        run: npm install -g cnpm --registry=https://registry.npmmirror.com

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev rpm fakeroot patchelf file

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: frontend
        run: cnpm install

      - name: Build Linux AppImage
        run: wails3 task linux:create:appimage

      - name: Prepare Linux release asset
        run: |
          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          APPIMAGE="$(find bin -maxdepth 1 -name '*.AppImage' | head -n 1)"
          if [ -z "${APPIMAGE}" ]; then
            echo "Linux AppImage not found" >&2
            exit 1
          fi
          cp "${APPIMAGE}" "release/${APP_NAME}-linux-amd64-${TAG}.AppImage"

      - name: Upload Linux asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*.AppImage
          fail_on_unmatched_files: true
