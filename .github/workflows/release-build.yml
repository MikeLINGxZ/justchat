name: Build Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  APP_NAME: lemontea
  WAILS_VERSION: v3.0.0-alpha.74
  NODE_VERSION: "24"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact_name: lemontea-macos
            package_command: wails3 task darwin:package:universal
            release_glob: release/*.zip
          - label: Windows
            os: windows-latest
            artifact_name: lemontea-windows
            package_command: wails3 task windows:package
            release_glob: release/*.exe
          - label: Linux
            os: ubuntu-latest
            artifact_name: lemontea-linux
            package_command: wails3 task linux:package
            release_glob: release/*

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            rpm \
            fakeroot \
            patchelf \
            file

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Wails CLI
        if: runner.os != 'Windows'
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Wails CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${env:WAILS_VERSION}
          "$((go env GOPATH))\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build packages
        run: ${{ matrix.package_command }}

      - name: Prepare macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release
          ditto -c -k --keepParent "bin/${APP_NAME}.app" "release/${APP_NAME}-macos-universal.zip"

      - name: Prepare Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $installer = Get-ChildItem -Path build/windows/nsis,bin -Filter "*-installer.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer not found"
          }
          Copy-Item $installer.FullName "release/${env:APP_NAME}-windows-amd64-installer.exe" -Force

      - name: Prepare Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release
          find bin -maxdepth 1 -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg.tar.zst' \) \
            -exec cp {} release/ \;
          if ! find release -maxdepth 1 -type f | grep -q .; then
            echo "No Linux package artifacts found" >&2
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_glob }}
          fail_on_unmatched_files: true
