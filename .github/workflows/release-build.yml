name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: lemontea

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify NSIS
        shell: pwsh
        run: |
          Get-Command makensis
          makensis /VERSION

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          "$((go env GOPATH))\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        shell: pwsh
        run: npm install

      - name: Build Windows installer
        shell: pwsh
        run: wails3 package GOOS=windows

      - name: Prepare Windows release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem -Path bin,build/windows/nsis -Filter "*-installer.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer not found"
          }
          $target = "release/${env:APP_NAME}-windows-amd64-$tag-installer.exe"
          Copy-Item $installer.FullName $target -Force

      - name: Upload Windows asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*.exe
          fail_on_unmatched_files: true

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Package macOS app
        run: wails3 package GOOS=darwin

      - name: Prepare macOS release asset
        run: |
          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          APP_BUNDLE="$(find bin -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "${APP_BUNDLE}" ]; then
            echo "macOS app bundle not found" >&2
            exit 1
          fi
          ditto -c -k --keepParent "${APP_BUNDLE}" "release/${APP_NAME}-macos-${TAG}.zip"

      - name: Upload macOS asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*.zip
          fail_on_unmatched_files: true

  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev rpm fakeroot patchelf file

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Package Linux app
        run: wails3 package GOOS=linux

      - name: Prepare Linux release assets
        run: |
          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          APPIMAGE="$(find bin -maxdepth 1 -name '*.AppImage' | head -n 1)"
          DEB="$(find bin -maxdepth 1 -name '*.deb' | head -n 1)"
          RPM="$(find bin -maxdepth 1 -name '*.rpm' | head -n 1)"

          if [ -z "${APPIMAGE}" ] || [ -z "${DEB}" ] || [ -z "${RPM}" ]; then
            echo "Expected Linux package outputs (.AppImage, .deb, .rpm) were not all generated" >&2
            exit 1
          fi

          cp "${APPIMAGE}" "release/${APP_NAME}-linux-amd64-${TAG}.AppImage"
          cp "${DEB}" "release/${APP_NAME}-linux-amd64-${TAG}.deb"
          cp "${RPM}" "release/${APP_NAME}-linux-amd64-${TAG}.rpm"

      - name: Upload Linux asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
          fail_on_unmatched_files: true
