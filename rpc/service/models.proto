syntax = "proto3";
package lemon_tea.server;

option go_package = "gitlab.linhf.cn/project/lemontea/lemon_tea_desktop/rpc/service";

import "google/api/annotations.proto";
import "rpc/common/common.proto";
import "rpc/common/options.proto";

// Models 服务，提供与 OpenAI Models API 对齐的能力
service Models {
  // 列出可用模型（等价 OpenAI GET /v1/models）
  rpc models(ModelsRequest) returns (ModelsResponse) {
    option (lemon_tea.common.requires_auth) = true;
    option (google.api.http) = {
      post: "/v1/models"
    };
  }
}

// ListModelsRequest 允许通过 providerId 或直接 base_url/api_key 指定目标提供方
message ModelsRequest {
  string llm_provider_id = 1; // 优先使用 providerId
  string base_url = 2;        // 当未提供 providerId 时使用
  string api_key = 3;         // 当未提供 providerId 时使用
}

message ModelsResponse {
  string object = 1;
  repeated lemon_tea.common.Model data = 2; // 模型列表
}
