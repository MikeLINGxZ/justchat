syntax = "proto3";
package lemon_tea.server;

option go_package = "gitlab.linhf.cn/project/lemontea/lemon_tea_desktop/rpc/service";

import "google/api/annotations.proto";
import "rpc/common/options.proto";
import "rpc/common/common.proto";

service Auth {
  // SendEmailVerificationCode 发送邮件验证码
  rpc SendEmailVerificationCode(SendEmailVerificationCodeRequest) returns (lemon_tea.common.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/send-email-code"
      body: "*"
    };
  }

  // CheckFieldAvailability 检查用户名或邮箱是否被使用
  rpc CheckFieldAvailability(CheckFieldAvailabilityRequest) returns (CheckFieldAvailabilityResponse) {
    option (google.api.http) = {
      post: "/v1/auth/check-availability"
      body: "*"
    };
  }

  // Register 注册
  rpc Register(RegisterRequest) returns (lemon_tea.common.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }

  // Login 登录
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }

  // ResetPassword 忘记密码
  rpc ResetPassword(ResetPasswordRequest) returns (lemon_tea.common.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/reset-password"
      body: "*"
    };
  }

  // Logout 登出
  rpc Logout(LogoutRequest) returns (lemon_tea.common.Empty) {
    option (lemon_tea.common.requires_auth) = true;
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
  }
}

// FieldType 字段类型枚举
enum FieldType {
  FIELD_TYPE_UNSPECIFIED = 0;
  FIELD_TYPE_USERNAME = 1;
  FIELD_TYPE_EMAIL = 2;
}



// SendEmailVerificationCodeRequest 发送邮件验证码请求
message SendEmailVerificationCodeRequest {
  string email = 1; // 邮箱地址
  string username = 2;
  lemon_tea.common.VerificationCodeType code_type = 3;
}

// SendEmailVerificationCodeResponse 发送邮件验证码返回
message SendEmailVerificationCodeResponse {
  bool success = 1;     // 是否成功
  string message = 2;   // 响应消息
}

// CheckFieldAvailabilityRequest 检查字段可用性请求
message CheckFieldAvailabilityRequest {
  FieldType field_type = 1; // 字段类型
  string value = 2;         // 字段值
}

// CheckFieldAvailabilityResponse 检查字段可用性返回
message CheckFieldAvailabilityResponse {
  bool available = 1;   // 是否可用
}

// RegisterRequest 注册请求
message RegisterRequest {
  string username = 1;           // 用户名
  string password_md5 = 2;       // 密码MD5
  string email = 3;              // 邮箱
  int64 email_verification_code = 4; // 邮箱验证码
}

// RegisterResponse 注册返回
message RegisterResponse {
  bool success = 1;     // 是否成功
  string message = 2;   // 响应消息
  optional string user_id = 3; // 用户ID（成功时返回）
}

// LoginRequest 登录请求
message LoginRequest {
  string login_field = 1;   // 登录字段（用户名或邮箱）
  string password_md5 = 2;  // 密码MD5
}

// LoginResponse 登录返回
message LoginResponse {
  optional string access_token = 1;  // 访问令牌
  optional int64 expires_in = 2;     // 令牌过期时间（秒）
  optional UserInfo user_info = 3;   // 用户信息
}

// ResetPasswordRequest 重置密码请求
message ResetPasswordRequest {
  string login_field = 1;            // 登录字段（用户名或邮箱）
  string email_verification_code = 2; // 邮箱验证码
  string new_password_md5 = 3;       // 新密码MD5
}

// LogoutRequest 登出请求
message LogoutRequest {
  // 可以为空，通过认证头获取用户信息
}

// UserInfo 用户信息
message UserInfo {
  int64 user_id = 1;   // 用户ID
  string username = 2;  // 用户名
  string email = 3;     // 邮箱
  int64 created_at = 4; // 创建时间（Unix时间戳）
  int64 updated_at = 5; // 更新时间（Unix时间戳）
}