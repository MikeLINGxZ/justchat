syntax = "proto3";
package lemon_tea.common;
option go_package = "gitlab.linhf.cn/project/lemontea/lemon_tea_cli/rpc";

// Empty 空参数占位
message Empty {}

// LlmProvider llm API配置信息
message LlmProvider {
  string  id = 1;           // 唯一标识符
  string name = 2;           // 名称
  string base_url = 3;       // API 基础地址
  string api_key = 4;        // API 密钥
  optional string alias = 5; // 别名（可选）
  optional string description = 6; // 描述（可选）
  repeated Model models = 7; // 支持的模型列表
}

// Model llm模型信息
message Model {
  string id = 1;             // 模型 ID
  string object = 2;         // 对象类型（如 model）
  string owned_by = 3;       // 所属组织或提供方
  bool enabled = 4;          // 是否启用
}

// RoleType 是消息角色类型的枚举
enum RoleType {
  ROLE_TYPE_UNSPECIFIED = 0; // 未指定
  ROLE_TYPE_ASSISTANT = 1;   // 助手（AI 回复）
  ROLE_TYPE_USER = 2;        // 用户输入
  ROLE_TYPE_SYSTEM = 3;      // 系统指令
  ROLE_TYPE_TOOL = 4;        // 工具调用返回
}

// ImageURLDetail 是图像 URL 的细节级别
enum ImageURLDetail {
  IMAGE_URL_DETAIL_UNSPECIFIED = 0; // 未指定
  IMAGE_URL_DETAIL_HIGH = 1;        // 高质量
  IMAGE_URL_DETAIL_LOW = 2;         // 低质量
  IMAGE_URL_DETAIL_AUTO = 3;        // 自动选择
}

// ChatMessagePartType 是聊天消息中内容片段的类型
enum ChatMessagePartType {
  CHAT_MESSAGE_PART_TYPE_UNSPECIFIED = 0; // 未指定
  CHAT_MESSAGE_PART_TYPE_TEXT = 1;        // 文本
  CHAT_MESSAGE_PART_TYPE_IMAGE_URL = 2;   // 图像链接
  CHAT_MESSAGE_PART_TYPE_AUDIO_URL = 3;   // 音频链接
  CHAT_MESSAGE_PART_TYPE_VIDEO_URL = 4;   // 视频链接
  CHAT_MESSAGE_PART_TYPE_FILE_URL = 5;    // 文件链接
}

// FunctionCall 是消息中的函数调用信息
message FunctionCall {
  // Name 是要调用的函数名称
  string name = 1;
  // Arguments 是调用函数所需的参数，以 JSON 格式表示
  string arguments = 2;
}

// ToolCall 是消息中的工具调用信息
message ToolCall {
  // Index 在一条消息包含多个工具调用时使用
  optional int32 index = 1;
  // ID 是工具调用的唯一标识
  string id = 2;
  // Type 是工具调用的类型
  string type = 3;
  // Function 是具体的函数调用内容
  FunctionCall function = 4;
  // Extra 用于存储工具调用的额外信息
  map<string, string> extra = 5;
}

// ChatMessageImageURL 表示聊天消息中的图像部分
message ChatMessageImageURL {
  // URL 可以是传统 URL 或符合 RFC-2397 的特殊 URL（如 data URL）
  string url = 1;
  string uri = 2;
  // Detail 是图像 URL 的质量等级
  ImageURLDetail detail = 3;
  // MIMEType 是图像的 MIME 类型
  string mime_type = 4;
  // Extra 用于存储图像 URL 的额外信息
  map<string, string> extra = 5;
}

// ChatMessageAudioURL 表示聊天消息中的音频部分
message ChatMessageAudioURL {
  // URL 可以是传统 URL 或符合 RFC-2397 的特殊 URL
  string url = 1;
  string uri = 2;
  // MIMEType 是音频的 MIME 类型
  string mime_type = 3;
  // Extra 用于存储音频 URL 的额外信息
  map<string, string> extra = 4;
}

// ChatMessageVideoURL 表示聊天消息中的视频部分
message ChatMessageVideoURL {
  // URL 可以是传统 URL 或符合 RFC-2397 的特殊 URL
  string url = 1;
  string uri = 2;
  // MIMEType 是视频的 MIME 类型
  string mime_type = 3;
  // Extra 用于存储视频 URL 的额外信息
  map<string, string> extra = 4;
}

// ChatMessageFileURL 表示聊天消息中的文件部分
message ChatMessageFileURL {
  string url = 1;            // 文件 URL
  string uri = 2;
  // MIMEType 是文件的 MIME 类型
  string mime_type = 3;
  // Name 是文件名称
  string name = 4;
  // Extra 用于存储文件 URL 的额外信息
  map<string, string> extra = 5;
}

// ChatMessagePart 是聊天消息中的内容片段
message ChatMessagePart {
  // Type 是片段的类型
  ChatMessagePartType type = 1;
  // Text 是文本内容，当 Type 为 "text" 时使用
  string text = 2;
  // ImageURL 是图像链接内容，当 Type 为 "image_url" 时使用
  optional ChatMessageImageURL image_url = 3;
  // AudioURL 是音频链接内容，当 Type 为 "audio_url" 时使用
  optional ChatMessageAudioURL audio_url = 4;
  // VideoURL 是视频链接内容，当 Type 为 "video_url" 时使用
  optional ChatMessageVideoURL video_url = 5;
  // FileURL 是文件链接内容，当 Type 为 "file_url" 时使用
  optional ChatMessageFileURL file_url = 6;
}

// TopLogProb 表示某个 token 的最高对数概率信息
message TopLogProb {
  // Token 表示 token 的文本内容
  string token = 1;
  // LogProb 是该 token 的对数概率
  double log_prob = 2;
  // Bytes 是该 token 的 UTF-8 字节表示（整数列表）
  repeated int64 bytes = 3;
}

// LogProb 表示一个 token 的概率信息
message LogProb {
  // Token 表示 token 的文本内容
  string token = 1;
  // LogProb 是该 token 的对数概率
  double log_prob = 2;
  // Bytes 是该 token 的 UTF-8 字节表示（整数列表）
  repeated int64 bytes = 3;
  // TopLogProbs 是最可能的若干 token 及其对数概率列表
  repeated TopLogProb top_log_probs = 4;
}

// LogProbs 是包含 token 概率信息的顶层结构
message LogProbs {
  // Content 是包含对数概率信息的消息内容 token 列表
  repeated LogProb content = 1;
}

// TokenUsage 表示聊天模型请求的 token 使用情况
message TokenUsage {
  // PromptTokens 是提示词中的 token 数量
  int32 prompt_tokens = 1;
  // CompletionTokens 是生成内容中的 token 数量
  int32 completion_tokens = 2;
  // TotalTokens 是请求中总的 token 数量
  int32 total_tokens = 3;
}

// ResponseMeta 收集聊天响应的元信息
message ResponseMeta {
  // FinishReason 是聊天响应结束的原因
  string finish_reason = 1;
  // Usage 是聊天响应的 token 使用情况
  optional TokenUsage usage = 2;
  // LogProbs 是对数概率信息
  optional LogProbs log_probs = 3;
}

// Message 表示一条聊天消息
message Message {
  RoleType role = 1;                         // 角色类型
  string content = 2;                        // 消息内容（纯文本）
  // 如果 multi_content 非空，则优先使用它而不是 content
  repeated ChatMessagePart multi_content = 3;
  string name = 4;                           // 发送者名称（如用户或工具名）
  // 仅用于 Assistant 消息
  repeated ToolCall tool_calls = 5;
  // 仅用于 Tool 消息
  string tool_call_id = 6;                   // 工具调用 ID
  // 仅用于 Tool 消息
  string tool_name = 7;                      // 工具名称
  optional ResponseMeta response_meta = 8;   // 响应元信息
  // ReasoningContent 是模型的推理思考过程
  string reasoning_content = 9;
  // 针对特定模型实现的自定义扩展信息
  map<string, string> extra = 10;
}

// MessageList 表示一组消息的列表
message MessageList {
  repeated Message messages = 1;
}

// Request and Response messages for RPC operations
// RPC 操作的请求与响应消息

message CreateMessageRequest {
  Message message = 1;   // 创建消息的请求
}
message CreateMessageResponse {
  string message_id = 1; // 创建成功的消息 ID
  Message message = 2;   // 返回完整的消息对象
}

message GetMessageRequest {
  string message_id = 1; // 根据 ID 获取消息
}
message GetMessageResponse {
  Message message = 1;   // 返回的消息对象
}

message UpdateMessageRequest {
  string message_id = 1; // 要更新的消息 ID
  Message message = 2;   // 更新后的内容
}
message UpdateMessageResponse {
  Message message = 1;   // 返回更新后的消息
}

message DeleteMessageRequest {
  string message_id = 1; // 要删除的消息 ID
}
message DeleteMessageResponse {
  bool success = 1;      // 删除是否成功
}

message ListMessagesRequest {
  int32 page_size = 1;   // 分页大小
  string page_token = 2; // 分页令牌
  string filter = 3;     // 过滤条件
}
message ListMessagesResponse {
  repeated Message messages = 1;     // 消息列表
  string next_page_token = 2;        // 下一页令牌
  int32 total_count = 3;             // 总数量
}