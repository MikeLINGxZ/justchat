# Feel free to remove those if you don't want/need to use them.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`

name: "init"
arch: ${GOARCH}
platform: "linux"
version: "0.1.0"
section: "default"
priority: "extra"
maintainer: ${GIT_COMMITTER_NAME} <${GIT_COMMITTER_EMAIL}>
description: "A init application"
vendor: "My Company"
homepage: "https://wails.io"
license: "MIT"
release: "1"

contents:
  - src: "./bin/init"
    dst: "/usr/local/bin/init"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/init.png"
  - src: "./build/linux/init.desktop"
    dst: "/usr/share/applications/init.desktop"

# Default dependencies for Linux packages built with Wails v3's GTK4/WebKitGTK 6.0 stack
depends:
  - libgtk-4-1
  - libwebkitgtk-6.0-4

# Distribution-specific overrides for package naming differences
overrides:
  # RPM package names
  rpm:
    depends:
      - gtk4
      - webkitgtk6.0

  # Arch Linux package names
  archlinux:
    depends:
      - gtk4
      - webkitgtk-6.0

# scripts section to ensure desktop database is updated after install
scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
  # You can also add preremove, postremove if needed
  # preremove: "./build/linux/nfpm/scripts/preremove.sh"
  # postremove: "./build/linux/nfpm/scripts/postremove.sh"

